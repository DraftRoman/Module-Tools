name: Validate PR Metadata

on:
  pull_request_target:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate PR metadata
        uses: CodeYourFuture/pr-metadata-validator@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
